<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Inter, Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="600" fill="#FFFFFF"/>

  <!-- ============================================ -->
  <!-- TOP SECTION: Capability Identity -->
  <!-- ============================================ -->

  <!-- Eyebrow -->
  <text x="48" y="40" font-size="11" fill="#CC0000" font-weight="700" letter-spacing="2">RADIANT AI CAPABILITY</text>

  <!-- Capability Name -->
  <text x="48" y="76" font-size="30" fill="#003087" font-weight="800">Friction Observability</text>

  <!-- Internal Product Names -->
  <text x="48" y="100" font-size="13" fill="#666666" font-weight="500">Powered by Intelligent CX + Agentic Data Platform + KAG</text>

  <!-- One-liner -->
  <text x="48" y="130" font-size="14" fill="#333333" font-weight="400">The AI identifies which members are at risk, behaving differently, or showing early signals</text>
  <text x="48" y="148" font-size="14" fill="#333333" font-weight="400">of friction or churn, without manual tagging or report-building.</text>

  <!-- Divider -->
  <line x1="48" y1="164" x2="912" y2="164" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- MIDDLE SECTION: Architecture Diagram -->
  <!-- ============================================ -->

  <!-- Section label -->
  <text x="48" y="190" font-size="11" fill="#003087" font-weight="700" letter-spacing="1.5">UNDERLYING ARCHITECTURE</text>

  <!-- ── Layer 1: Data Sources (bottom) ── -->
  <rect x="48" y="460" width="864" height="60" rx="4" fill="#F4F5F7" stroke="#E0E0E0" stroke-width="1"/>
  <text x="68" y="478" font-size="9" fill="#666666" font-weight="700" letter-spacing="1">USSFCU DATA SOURCES</text>

  <!-- Salesforce data sources -->
  <rect x="68" y="490" width="110" height="22" rx="3" fill="#003087"/>
  <text x="123" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Data Cloud</text>

  <rect x="188" y="490" width="130" height="22" rx="3" fill="#003087"/>
  <text x="253" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Financial Services Cloud</text>

  <rect x="328" y="490" width="110" height="22" rx="3" fill="#003087"/>
  <text x="383" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Marketing Cloud</text>

  <rect x="448" y="490" width="100" height="22" rx="3" fill="#003087"/>
  <text x="498" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Service Cloud</text>

  <!-- Non-Salesforce data sources -->
  <rect x="568" y="490" width="100" height="22" rx="3" fill="#00897B"/>
  <text x="618" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Genesys Cloud</text>

  <rect x="678" y="490" width="80" height="22" rx="3" fill="#00897B"/>
  <text x="718" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Snowflake</text>

  <rect x="768" y="490" width="60" height="22" rx="3" fill="#00897B"/>
  <text x="798" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Blend</text>

  <rect x="838" y="490" width="60" height="22" rx="3" fill="#00897B"/>
  <text x="868" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">ICE/LOS</text>

  <!-- Up arrows from data sources to Agentic Data Platform -->
  <line x1="480" y1="458" x2="480" y2="432" stroke="#003087" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="476,434 480,426 484,434" fill="#003087"/>

  <!-- ── Layer 2: Agentic Data Platform ── -->
  <rect x="48" y="340" width="864" height="84" rx="6" fill="#003087" opacity="0.06" stroke="#003087" stroke-width="1.5"/>
  <text x="68" y="360" font-size="9" fill="#003087" font-weight="700" letter-spacing="1.5">AGENTIC DATA PLATFORM</text>
  <text x="350" y="360" font-size="9" fill="#666666" font-weight="400">Unified member profiles across Salesforce and non-Salesforce systems</text>

  <!-- Agent boxes -->
  <rect x="68" y="372" width="145" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="90" y="390" font-size="10" fill="#003087" font-weight="700">Inspector Agent</text>
  <text x="90" y="403" font-size="8" fill="#666666">Profiles member data quality</text>

  <rect x="228" y="372" width="145" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="250" y="390" font-size="10" fill="#003087" font-weight="700">Cleaning Agent</text>
  <text x="250" y="403" font-size="8" fill="#666666">Resolves identity conflicts</text>

  <rect x="388" y="372" width="145" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="410" y="390" font-size="10" fill="#003087" font-weight="700">Ontology Agent</text>
  <text x="410" y="403" font-size="8" fill="#666666">"Member" means one thing</text>

  <rect x="548" y="372" width="145" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="570" y="390" font-size="10" fill="#003087" font-weight="700">Enrichment Agent</text>
  <text x="570" y="403" font-size="8" fill="#666666">Adds behavioral context</text>

  <rect x="708" y="372" width="145" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="730" y="390" font-size="10" fill="#003087" font-weight="700">Cypher Agent</text>
  <text x="730" y="403" font-size="8" fill="#666666">Member relationship graph</text>

  <!-- Up arrows from Agentic Data Platform to Intelligent CX -->
  <line x1="480" y1="338" x2="480" y2="312" stroke="#003087" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="476,314 480,306 484,314" fill="#003087"/>

  <!-- ── Layer 3: Intelligent CX + Responsible AI ── -->
  <rect x="48" y="210" width="560" height="94" rx="6" fill="#003087" opacity="0.12" stroke="#003087" stroke-width="1.5"/>
  <text x="68" y="230" font-size="9" fill="#003087" font-weight="700" letter-spacing="1.5">INTELLIGENT CX</text>
  <text x="195" y="230" font-size="9" fill="#666666" font-weight="400">KAG-powered segmentation across VOC, behavior, and operational data</text>

  <!-- Intelligent CX capability cards -->
  <rect x="68" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="88" y="262" font-size="10" fill="#003087" font-weight="700">Pattern Detection</text>
  <text x="88" y="276" font-size="8" fill="#666666">Identifies emerging behavioral</text>
  <text x="88" y="286" font-size="8" fill="#666666">clusters across all sources</text>

  <rect x="245" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="265" y="262" font-size="10" fill="#003087" font-weight="700">Segment Profiling</text>
  <text x="265" y="276" font-size="8" fill="#666666">Auto-generates segment</text>
  <text x="265" y="286" font-size="8" fill="#666666">attributes, size, and risk</text>

  <rect x="422" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="442" y="262" font-size="10" fill="#003087" font-weight="700">Signal Mapping</text>
  <text x="442" y="276" font-size="8" fill="#666666">Links segments to friction,</text>
  <text x="442" y="286" font-size="8" fill="#666666">churn, and NPS drivers</text>

  <!-- Responsible AI sidebar -->
  <rect x="628" y="210" width="284" height="94" rx="6" fill="white" stroke="#00897B" stroke-width="1.5"/>
  <text x="648" y="230" font-size="9" fill="#00897B" font-weight="700" letter-spacing="1.5">RESPONSIBLE AI</text>

  <text x="648" y="252" font-size="9" fill="#333333" font-weight="600">Bias Detection in Segments</text>
  <text x="648" y="268" font-size="9" fill="#333333" font-weight="600">Explainable Segment Definitions</text>
  <text x="648" y="284" font-size="9" fill="#333333" font-weight="600">Fair Lending Compliance</text>
  <text x="648" y="300" font-size="9" fill="#333333" font-weight="600">NCUA/ECOA Alignment</text>

  <!-- ============================================ -->
  <!-- BOTTOM SECTION: Gap + Proof -->
  <!-- ============================================ -->

  <!-- Divider -->
  <line x1="48" y1="536" x2="912" y2="536" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Gap statement -->
  <rect x="48" y="548" width="560" height="40" rx="4" fill="#FFF8E1" stroke="#F59E0B" stroke-width="1"/>
  <text x="68" y="564" font-size="10" fill="#333333" font-weight="700">The gap today:</text>
  <text x="165" y="564" font-size="10" fill="#333333" font-weight="400">Segments are manually built in Marketing Cloud. No cross-platform behavioral detection.</text>
  <text x="68" y="580" font-size="10" fill="#333333" font-weight="700">With Friction Observability:</text>
  <text x="250" y="580" font-size="10" fill="#333333" font-weight="400">AI continuously surfaces where friction is forming and which members are affected.</text>

  <!-- Proof point -->
  <rect x="628" y="548" width="284" height="40" rx="4" fill="#F4F5F7" stroke="#E0E0E0" stroke-width="1"/>
  <text x="648" y="564" font-size="9" fill="#CC0000" font-weight="700" letter-spacing="1">DEPLOYED AT</text>
  <text x="648" y="580" font-size="12" fill="#003087" font-weight="800">Verizon</text>
  <text x="720" y="580" font-size="9" fill="#666666" font-weight="400">Across multiple engagements</text>

</svg>