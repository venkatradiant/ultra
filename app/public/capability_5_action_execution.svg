<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Inter, Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="600" fill="#FFFFFF"/>

  <!-- ============================================ -->
  <!-- TOP SECTION: Capability Identity -->
  <!-- ============================================ -->

  <!-- Eyebrow -->
  <text x="48" y="40" font-size="11" fill="#CC0000" font-weight="700" letter-spacing="2">RADIANT AI CAPABILITY</text>

  <!-- Capability Name -->
  <text x="48" y="76" font-size="30" fill="#003087" font-weight="800">Automated Action Execution</text>

  <!-- Internal Product Names -->
  <text x="48" y="100" font-size="13" fill="#666666" font-weight="500">Powered by ConverseAI + Agentic AI + Multi-Agent Orchestration</text>

  <!-- One-liner -->
  <text x="48" y="130" font-size="14" fill="#333333" font-weight="400">Move from insight to action inside the same conversation: create tickets, draft outreach,</text>
  <text x="48" y="148" font-size="14" fill="#333333" font-weight="400">trigger Agentforce workflows, all confirmed by the user before execution.</text>

  <!-- Divider -->
  <line x1="48" y1="164" x2="912" y2="164" stroke="#E0E0E0" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- MIDDLE SECTION: Architecture Diagram -->
  <!-- ============================================ -->

  <!-- Section label -->
  <text x="48" y="190" font-size="11" fill="#003087" font-weight="700" letter-spacing="1.5">UNDERLYING ARCHITECTURE</text>

  <!-- ── Layer 1: Target Systems (bottom) ── -->
  <rect x="48" y="460" width="864" height="60" rx="4" fill="#F4F5F7" stroke="#E0E0E0" stroke-width="1"/>
  <text x="68" y="478" font-size="9" fill="#666666" font-weight="700" letter-spacing="1">USSFCU EXECUTION TARGETS</text>

  <!-- Salesforce execution targets -->
  <rect x="68" y="490" width="100" height="22" rx="3" fill="#003087"/>
  <text x="118" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Agentforce</text>

  <rect x="178" y="490" width="100" height="22" rx="3" fill="#003087"/>
  <text x="228" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Marketing Cloud</text>

  <rect x="288" y="490" width="100" height="22" rx="3" fill="#003087"/>
  <text x="338" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Service Cloud</text>

  <rect x="398" y="490" width="80" height="22" rx="3" fill="#003087"/>
  <text x="438" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">MuleSoft</text>

  <!-- Non-Salesforce execution targets -->
  <rect x="498" y="490" width="100" height="22" rx="3" fill="#00897B"/>
  <text x="548" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Genesys Cloud</text>

  <rect x="608" y="490" width="70" height="22" rx="3" fill="#00897B"/>
  <text x="643" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">UiPath</text>

  <rect x="688" y="490" width="60" height="22" rx="3" fill="#00897B"/>
  <text x="718" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">JIRA</text>

  <rect x="758" y="490" width="60" height="22" rx="3" fill="#00897B"/>
  <text x="788" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Slack</text>

  <rect x="828" y="490" width="70" height="22" rx="3" fill="#00897B"/>
  <text x="863" y="505" text-anchor="middle" font-size="9" fill="white" font-weight="600">Email</text>

  <!-- Down arrows from orchestration to targets -->
  <line x1="480" y1="426" x2="480" y2="458" stroke="#003087" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="476,456 480,464 484,456" fill="#003087"/>

  <!-- ── Layer 2: Multi-Agent Orchestration ── -->
  <rect x="48" y="340" width="864" height="84" rx="6" fill="#003087" opacity="0.06" stroke="#003087" stroke-width="1.5"/>
  <text x="68" y="360" font-size="9" fill="#003087" font-weight="700" letter-spacing="1.5">MULTI-AGENT ORCHESTRATION</text>
  <text x="330" y="360" font-size="9" fill="#666666" font-weight="400">Persona-based micro agents dispatched to execute across systems</text>

  <!-- Agent boxes -->
  <rect x="68" y="372" width="155" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="90" y="390" font-size="10" fill="#003087" font-weight="700">State Management</text>
  <text x="90" y="403" font-size="8" fill="#666666">Tracks multi-step workflows</text>

  <rect x="238" y="372" width="155" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="260" y="390" font-size="10" fill="#003087" font-weight="700">Knowledge Graph</text>
  <text x="260" y="403" font-size="8" fill="#666666">Context for action decisions</text>

  <rect x="408" y="372" width="155" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="430" y="390" font-size="10" fill="#003087" font-weight="700">Model Context Protocol</text>
  <text x="430" y="403" font-size="8" fill="#666666">Cross-system API dispatch</text>

  <rect x="578" y="372" width="155" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="600" y="390" font-size="10" fill="#003087" font-weight="700">Error Recovery</text>
  <text x="600" y="403" font-size="8" fill="#666666">Graceful fallback on failure</text>

  <rect x="748" y="372" width="155" height="38" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="770" y="390" font-size="10" fill="#003087" font-weight="700">Audit Trail</text>
  <text x="770" y="403" font-size="8" fill="#666666">Every action logged</text>

  <!-- Up arrows from ConverseAI to Orchestration -->
  <line x1="480" y1="338" x2="480" y2="312" stroke="#003087" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="476,314 480,306 484,314" fill="#003087"/>

  <!-- ── Layer 3: ConverseAI + Agentic AI ── -->
  <rect x="48" y="210" width="560" height="94" rx="6" fill="#003087" opacity="0.12" stroke="#003087" stroke-width="1.5"/>
  <text x="68" y="230" font-size="9" fill="#003087" font-weight="700" letter-spacing="1.5">CONVERSEAI + AGENTIC AI</text>
  <text x="265" y="230" font-size="9" fill="#666666" font-weight="400">Conversational action layer with human-in-the-loop confirmation</text>

  <!-- Action capability cards -->
  <rect x="68" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="88" y="262" font-size="10" fill="#003087" font-weight="700">Action Planning</text>
  <text x="88" y="276" font-size="8" fill="#666666">AI recommends actions based</text>
  <text x="88" y="286" font-size="8" fill="#666666">on conversation context</text>

  <rect x="245" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="265" y="262" font-size="10" fill="#003087" font-weight="700">Confirm Before Execute</text>
  <text x="265" y="276" font-size="8" fill="#666666">User approves every action</text>
  <text x="265" y="286" font-size="8" fill="#666666">before dispatch to systems</text>

  <rect x="422" y="242" width="165" height="50" rx="4" fill="white" stroke="#003087" stroke-width="1"/>
  <text x="442" y="262" font-size="10" fill="#003087" font-weight="700">Execution Feedback</text>
  <text x="442" y="276" font-size="8" fill="#666666">Reports what was done,</text>
  <text x="442" y="286" font-size="8" fill="#666666">what to do next</text>

  <!-- Responsible AI sidebar -->
  <rect x="628" y="210" width="284" height="94" rx="6" fill="white" stroke="#00897B" stroke-width="1.5"/>
  <text x="648" y="230" font-size="9" fill="#00897B" font-weight="700" letter-spacing="1.5">RESPONSIBLE AI</text>

  <text x="648" y="252" font-size="9" fill="#333333" font-weight="600">Human-in-the-Loop Confirmation</text>
  <text x="648" y="268" font-size="9" fill="#333333" font-weight="600">Full Action Audit Trail</text>
  <text x="648" y="284" font-size="9" fill="#333333" font-weight="600">Role-Based Execution Permissions</text>
  <text x="648" y="300" font-size="9" fill="#333333" font-weight="600">Rollback Capability</text>

  <!-- ============================================ -->
  <!-- BOTTOM SECTION: Gap + Proof -->
  <!-- ============================================ -->

  <!-- Divider -->
  <line x1="48" y1="536" x2="912" y2="536" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Gap statement -->
  <rect x="48" y="548" width="560" height="40" rx="4" fill="#FFF8E1" stroke="#F59E0B" stroke-width="1"/>
  <text x="68" y="564" font-size="10" fill="#333333" font-weight="700">The gap today:</text>
  <text x="165" y="564" font-size="10" fill="#333333" font-weight="400">Insight lives in one system, action happens in another. Manual handoff between both.</text>
  <text x="68" y="580" font-size="10" fill="#333333" font-weight="700">With Action Execution:</text>
  <text x="225" y="580" font-size="10" fill="#333333" font-weight="400">From conversation to JIRA ticket, Slack message, or Agentforce workflow in one step.</text>

  <!-- Proof point -->
  <rect x="628" y="548" width="284" height="40" rx="4" fill="#F4F5F7" stroke="#E0E0E0" stroke-width="1"/>
  <text x="648" y="564" font-size="9" fill="#CC0000" font-weight="700" letter-spacing="1">DEPLOYED AT</text>
  <text x="648" y="580" font-size="12" fill="#003087" font-weight="800">Verizon</text>
  <text x="720" y="580" font-size="9" fill="#666666" font-weight="400">Across multiple engagements</text>

</svg>